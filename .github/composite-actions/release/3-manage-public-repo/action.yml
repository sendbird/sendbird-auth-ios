name: '3. Manage Public Repository'
description: 'Update public repository with new release'

inputs:
  release_version:
    description: 'SDK version for release'
    required: true
  spm_checksum_dynamic:
    description: 'SPM checksum for dynamic framework'
    required: true
  spm_checksum_static:
    description: 'SPM checksum for static framework'
    required: true
  cocoapods_sha1:
    description: 'CocoaPods SHA1'
    required: true
  gh_token:
    description: 'GitHub API token'
    required: true
  gh_token_for_pr_approval:
    description: 'GitHub token for PR approval'
    required: true
  github_public_repo:
    description: 'Public repository name'
    required: true
  is_test:
    description: 'Test mode flag'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Clone public repository
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        RELEASE_VERSION: ${{ inputs.release_version }}
        PUBLIC_REPO: ${{ inputs.github_public_repo }}
      run: |
        git clone git@github.com:sendbird/"${PUBLIC_REPO}".git ~/public-repo
        cd ~/public-repo

        # Check if remote branch exists and delete it
        if git ls-remote --heads origin "release/${RELEASE_VERSION}" | grep -q "release/${RELEASE_VERSION}"; then
          echo "Branch release/${RELEASE_VERSION} exists, deleting..."
          git push origin --delete "release/${RELEASE_VERSION}"
        fi

        git checkout -b "release/${RELEASE_VERSION}"

    - name: Update CHANGELOG.md
      shell: bash
      env:
        RELEASE_VERSION: ${{ inputs.release_version }}
        PUBLIC_REPO: ${{ inputs.github_public_repo }}
      run: |
        cd ~/public-repo

        DRAFT_CONTENT=$(cat $GITHUB_WORKSPACE/CHANGELOG_DRAFT.md)
        RELEASE_DATE=$(date +"%b %d, %Y")

        echo "# Changelog" > new_changelog.md
        echo "" >> new_changelog.md
        echo "## [${RELEASE_VERSION}](https://github.com/sendbird/${PUBLIC_REPO}/releases/tag/${RELEASE_VERSION}) (${RELEASE_DATE})" >> new_changelog.md
        echo "${DRAFT_CONTENT}" >> new_changelog.md

        if [ -f CHANGELOG.md ]; then
          tail -n +2 CHANGELOG.md >> new_changelog.md
        fi

        mv new_changelog.md CHANGELOG.md
        echo "Updated CHANGELOG.md"

    - name: Generate Package.swift
      shell: bash
      env:
        RELEASE_VERSION: ${{ inputs.release_version }}
        SPM_CHECKSUM_DYNAMIC: ${{ inputs.spm_checksum_dynamic }}
        SPM_CHECKSUM_STATIC: ${{ inputs.spm_checksum_static }}
        PUBLIC_REPO: ${{ inputs.github_public_repo }}
      run: |
        cd ~/public-repo
        bash $GITHUB_WORKSPACE/scripts/generate_package.sh \
          -v "$RELEASE_VERSION" \
          -c "$SPM_CHECKSUM_DYNAMIC" \
          -s "$SPM_CHECKSUM_STATIC" \
          -p SendbirdAuthSDK \
          -r "$PUBLIC_REPO"

        echo "Generated Package.swift"
        cat Package.swift

    - name: Generate Podspec
      shell: bash
      env:
        RELEASE_VERSION: ${{ inputs.release_version }}
        COCOAPODS_SHA1: ${{ inputs.cocoapods_sha1 }}
      run: |
        cd ~/public-repo
        bash $GITHUB_WORKSPACE/script/generate_podspec.sh \
          -v "$RELEASE_VERSION" \
          -s "$COCOAPODS_SHA1"

        echo "Generated SendbirdAuthSDK.podspec"
        cat SendbirdAuthSDK.podspec

    - name: Commit and push changes
      shell: bash
      env:
        RELEASE_VERSION: ${{ inputs.release_version }}
      run: |
        cd ~/public-repo
        git config user.name "sendbird-sdk-deployment"
        git config user.email "sha.sdk_deployment@sendbird.com"

        git add -A
        git commit -m "Release ${RELEASE_VERSION}"
        git push origin "release/${RELEASE_VERSION}"

    - name: Git - Public Repo - Create PR (release/xxx -> main)
      id: create_public_release_pr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        RELEASE_VERSION: ${{ inputs.release_version }}
        PUBLIC_REPO: ${{ inputs.github_public_repo }}
      run: |
        result_pr_number=$(python3 ~/sdk-deployment/scripts/v1.2/github_pr_create.py \
          --github_api_token $GH_TOKEN \
          --repo_name $PUBLIC_REPO \
          --head "release/$RELEASE_VERSION" \
          --base main \
          --title "Release $RELEASE_VERSION" \
          --body "Release $RELEASE_VERSION" \
          --output_pr_number)
        echo "PUBLIC_RELEASE_PR_NUMBER=$result_pr_number" >> $GITHUB_ENV
        echo "public_release_pr_number=$result_pr_number" >> $GITHUB_OUTPUT

    - name: Git - Public Repo - Approve PR (release/xxx -> main)
      shell: bash
      env:
        GH_TOKEN_FOR_PR_APPROVAL: ${{ inputs.gh_token_for_pr_approval }}
        PUBLIC_REPO: ${{ inputs.github_public_repo }}
        PUBLIC_RELEASE_PR_NUMBER: ${{ env.PUBLIC_RELEASE_PR_NUMBER }}
        RELEASE_VERSION: ${{ inputs.release_version }}
      run: |
        curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GH_TOKEN_FOR_PR_APPROVAL" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/sendbird/${PUBLIC_REPO}/pulls/${PUBLIC_RELEASE_PR_NUMBER}/reviews \
          -d '{"body":"Release '$RELEASE_VERSION'","event":"APPROVE"}'

    - name: Git - Public Repo - Merge PR (release/xxx -> main)
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        PUBLIC_REPO: ${{ inputs.github_public_repo }}
        RELEASE_VERSION: ${{ inputs.release_version }}
        IS_TEST: ${{ inputs.is_test }}
      run: |
        if [ "$IS_TEST" == "true" ]; then
          echo "python3 ~/sdk-deployment/scripts/v1.2/github_pr_merge.py \\
            --github_api_token \$GH_TOKEN \\
            --repo_name $PUBLIC_REPO \\
            --branch_name release/$RELEASE_VERSION"
        else
          python3 ~/sdk-deployment/scripts/v1.2/github_pr_merge.py \
            --github_api_token $GH_TOKEN \
            --repo_name $PUBLIC_REPO \
            --branch_name "release/$RELEASE_VERSION"
        fi

    - name: Create release tag on public repo
      if: inputs.is_test == 'false'
      shell: bash
      env:
        RELEASE_VERSION: ${{ inputs.release_version }}
      run: |
        cd ~/public-repo
        git checkout main
        git pull origin main
        git tag "$RELEASE_VERSION"
        git push origin "$RELEASE_VERSION"
