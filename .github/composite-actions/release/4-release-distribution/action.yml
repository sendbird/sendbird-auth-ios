name: '4. Release Distribution'
description: 'Create GitHub Release and publish to CocoaPods'

inputs:
  release_version:
    description: 'SDK version for release'
    required: true
  gh_api_token:
    description: 'GitHub API token'
    required: true
  cocoapods_trunk_token:
    description: 'CocoaPods trunk token'
    required: true
  github_public_repo:
    description: 'Public repository name'
    required: true
  is_test:
    description: 'Test mode flag'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts

    - name: Prepare release assets
      shell: bash
      run: |
        mkdir -p release-assets

        # Dynamic framework for SPM
        cp release-artifacts/dynamic-xcframework/SendbirdAuthSDK.xcframework.zip release-assets/

        # Static framework for SPM
        cp release-artifacts/static-xcframework/SendbirdAuthSDKStatic.xcframework.zip release-assets/

        # CocoaPods package (Dynamic with LICENSE)
        cp release-artifacts/dynamic-xcframework/SendbirdAuthSDK.zip release-assets/

        echo "Release assets:"
        ls -la release-assets/

    - name: Git - Create public repo release
      id: create_release
      if: inputs.is_test == 'false'
      shell: bash
      env:
        GH_API_TOKEN: ${{ inputs.gh_api_token }}
        RELEASE_VERSION: ${{ inputs.release_version }}
        PUBLIC_REPO: ${{ inputs.github_public_repo }}
      run: |
        result=$(python3 ~/sdk-deployment/scripts/v1.2/create_github_release.py \
          --github_api_token $GH_API_TOKEN \
          --repo_name $PUBLIC_REPO \
          --tag_name "$RELEASE_VERSION" \
          --target_commitish main \
          --body_path "$GITHUB_WORKSPACE/CHANGELOG_DRAFT.md")

        echo $result
        upload_url=$(echo $result | jq ".upload_url" | sed -E 's/^"|"$//g' | sed 's/\assets{.*/assets/')
        echo "UPLOAD_URL=$upload_url" >> $GITHUB_ENV
        echo "upload_url=$upload_url" >> $GITHUB_OUTPUT

    - name: Upload Dynamic xcframework.zip
      if: inputs.is_test == 'false'
      shell: bash
      env:
        GH_API_TOKEN: ${{ inputs.gh_api_token }}
        UPLOAD_URL: ${{ env.UPLOAD_URL }}
      run: |
        set -euo pipefail
        file="$GITHUB_WORKSPACE/release-assets/SendbirdAuthSDK.xcframework.zip"
        if [ ! -f "$file" ]; then
          echo "[ERROR] Missing file: $file" >&2
          exit 1
        fi
        echo "Uploading $(basename "$file")"
        curl \
          -H "Authorization: token $GH_API_TOKEN" \
          -H "Content-Type: $(file -b --mime-type "$file")" \
          --data-binary @"$file" \
          "$UPLOAD_URL?name=$(basename "$file")"

    - name: Upload Static xcframework.zip
      if: inputs.is_test == 'false'
      shell: bash
      env:
        GH_API_TOKEN: ${{ inputs.gh_api_token }}
        UPLOAD_URL: ${{ env.UPLOAD_URL }}
      run: |
        set -euo pipefail
        file="$GITHUB_WORKSPACE/release-assets/SendbirdAuthSDKStatic.xcframework.zip"
        if [ ! -f "$file" ]; then
          echo "[ERROR] Missing file: $file" >&2
          exit 1
        fi
        echo "Uploading $(basename "$file")"
        curl \
          -H "Authorization: token $GH_API_TOKEN" \
          -H "Content-Type: $(file -b --mime-type "$file")" \
          --data-binary @"$file" \
          "$UPLOAD_URL?name=$(basename "$file")"

    - name: Upload CocoaPods distribution zip
      if: inputs.is_test == 'false'
      shell: bash
      env:
        GH_API_TOKEN: ${{ inputs.gh_api_token }}
        UPLOAD_URL: ${{ env.UPLOAD_URL }}
      run: |
        set -euo pipefail
        file="$GITHUB_WORKSPACE/release-assets/SendbirdAuthSDK.zip"
        if [ ! -f "$file" ]; then
          echo "[ERROR] Missing file: $file" >&2
          exit 1
        fi
        echo "Uploading $(basename "$file")"
        curl \
          -H "Authorization: token $GH_API_TOKEN" \
          -H "Content-Type: $(file -b --mime-type "$file")" \
          --data-binary @"$file" \
          "$UPLOAD_URL?name=$(basename "$file")"

    - name: Set up .netrc with CocoaPods token
      shell: bash
      env:
        COCOAPODS_TRUNK_TOKEN: ${{ inputs.cocoapods_trunk_token }}
      run: |
        echo "machine trunk.cocoapods.org" >> ~/.netrc
        echo "  login sha.sdk_deployment@sendbird.com" >> ~/.netrc
        echo "  password $COCOAPODS_TRUNK_TOKEN" >> ~/.netrc
        chmod 600 ~/.netrc

    - name: Check CocoaPods trunk user
      shell: bash
      run: |
        pod trunk me

    - name: Lint podspec
      if: inputs.is_test == 'false'
      shell: bash
      run: |
        cd ~/public-repo
        pod spec lint --allow-warnings

    - name: Publish to CocoaPods
      if: inputs.is_test == 'false'
      shell: bash
      env:
        COCOAPODS_TRUNK_TOKEN: ${{ inputs.cocoapods_trunk_token }}
      run: |
        cd ~/public-repo

        echo "Publishing to CocoaPods trunk..."
        pod trunk push --allow-warnings

    - name: Test mode summary
      if: inputs.is_test == 'true'
      shell: bash
      env:
        RELEASE_VERSION: ${{ inputs.release_version }}
      run: |
        echo "=== TEST MODE - Distribution Summary ==="
        echo "Would create GitHub Release: ${RELEASE_VERSION}"
        echo "Would upload assets:"
        ls -la release-assets/
        echo "Would publish to CocoaPods: SendbirdAuthSDK.podspec"
