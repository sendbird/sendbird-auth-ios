name: Check ABI Compatibility

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Target branch to check ABI for'
        required: true
        type: string
      base_branch:
        description: 'Base branch to compare against'
        required: false
        default: 'main'
        type: string

jobs:
  check-abi:
    # Run on:
    # - PR opened from release branches (case-insensitive)
    # - PR comments containing /abi (on release branches only)
    # - Manual workflow_dispatch
    if: |
      github.event_name == 'workflow_dispatch'
        || (github.event_name == 'pull_request'
            && (startsWith(github.head_ref, 'release/')
                || startsWith(github.head_ref, 'Release/')
                || startsWith(github.head_ref, 'RELEASE/')))
        || (github.event_name == 'issue_comment'
            && contains(github.event.comment.html_url, '/pull/')
            && contains(github.event.comment.body, '/abi'))
    runs-on: macos-15

    steps:
      - name: Get PR details
        id: pr-details
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const headRef = pr.data.head.ref;
            core.setOutput('head_ref', headRef);
            console.log(`PR head branch: ${headRef}`);

      - name: Check if release branch
        id: check-branch
        if: github.event_name == 'issue_comment'
        env:
          HEAD_REF: ${{ steps.pr-details.outputs.head_ref }}
        run: |
          echo "PR branch: $HEAD_REF"
          if [[ ! "$HEAD_REF" =~ ^release/ ]]; then
            echo "::error::This workflow only runs on release branches (branch name must start with 'release/'). Current branch: $HEAD_REF"
            exit 1
          fi
          echo "Branch validation passed: $HEAD_REF is a release branch"

      - name: Parse parameters
        id: parse-params
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          HEAD_REF: ${{ steps.pr-details.outputs.head_ref }}
          PR_HEAD_REF: ${{ github.head_ref }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TARGET: ${{ inputs.target_branch }}
          INPUT_BASE: ${{ inputs.base_branch }}
        run: |
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            # Use inputs from workflow_dispatch
            TARGET_BRANCH="$INPUT_TARGET"
            BASE_BRANCH="${INPUT_BASE:-main}"
            echo "Using workflow_dispatch inputs"
          elif [ "$EVENT_NAME" == "pull_request" ]; then
            # Use PR head branch for pull_request event
            TARGET_BRANCH="$PR_HEAD_REF"
            BASE_BRANCH="main"
            echo "Using pull_request event - target: $TARGET_BRANCH, base: $BASE_BRANCH"
          else
            # Parse from PR comment (issue_comment event)
            echo "Comment body: $COMMENT_BODY"

            # Parse --target parameter (default to PR head branch)
            TARGET_BRANCH=$(echo "$COMMENT_BODY" | grep -oE '\-\-target\s+[^\s]+' | sed 's/--target\s*//' || true)
            if [ -z "$TARGET_BRANCH" ]; then
              TARGET_BRANCH="$HEAD_REF"
              echo "No --target specified, using PR branch: $TARGET_BRANCH"
            else
              echo "Using specified --target: $TARGET_BRANCH"
            fi

            # Parse --base parameter (default to main)
            BASE_BRANCH=$(echo "$COMMENT_BODY" | grep -oE '\-\-base\s+[^\s]+' | sed 's/--base\s*//' || true)
            if [ -z "$BASE_BRANCH" ]; then
              BASE_BRANCH="main"
              echo "No --base specified, using default: $BASE_BRANCH"
            else
              echo "Using specified --base: $BASE_BRANCH"
            fi
          fi

          echo "Target branch: $TARGET_BRANCH"
          echo "Base branch: $BASE_BRANCH"
          echo "target_branch=$TARGET_BRANCH" >> $GITHUB_OUTPUT
          echo "base_branch=$BASE_BRANCH" >> $GITHUB_OUTPUT

      - name: Add reaction to comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Add starting comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔍 Starting ABI compatibility check...\n\n- **Target branch:** \`${{ steps.parse-params.outputs.target_branch }}\`\n- **Base branch:** \`${{ steps.parse-params.outputs.base_branch }}\``
            });

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR branch (issue_comment)
        if: github.event_name == 'issue_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr checkout ${{ github.event.issue.number }}

      - name: Checkout PR branch (pull_request)
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Select Xcode 16.4
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version

      - name: Install dependencies
        run: |
          brew install xcodegen
          gem install xcpretty

      - name: Configure git credentials for private dependencies
        env:
          GH_TOKEN: ${{ secrets.GH_API_TOKEN }}
        run: |
          git config --global url."https://${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Run ABI Stability Check
        id: abi-check
        uses: ./.github/composite-actions/check-abi-stability
        with:
          target_name: 'SendbirdAuthSDK'
          target_branch: ${{ steps.parse-params.outputs.target_branch }}
          base_branch: ${{ steps.parse-params.outputs.base_branch }}

      - name: Post success comment
        if: success() && github.event_name == 'issue_comment' && steps.abi-check.outputs.has_changes == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ ABI compatibility check completed! No breaking changes detected.\n\n- **Target branch:** \`${{ steps.parse-params.outputs.target_branch }}\`\n- **Base branch:** \`${{ steps.parse-params.outputs.base_branch }}\``
            });

      - name: Post breaking changes comment
        if: success() && github.event_name == 'issue_comment' && steps.abi-check.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ ABI compatibility is broken.\n\n- **Target branch:** \`${{ steps.parse-params.outputs.target_branch }}\`\n- **Base branch:** \`${{ steps.parse-params.outputs.base_branch }}\`\n\nCheck the workflow for details: ${runUrl}`
            });

      - name: Post workflow error comment
        if: failure() && github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ ABI compatibility check failed!\n\n- **Target branch:** \`${{ steps.parse-params.outputs.target_branch }}\`\n- **Base branch:** \`${{ steps.parse-params.outputs.base_branch }}\`\n\nCheck the workflow for details: ${runUrl}`
            });

