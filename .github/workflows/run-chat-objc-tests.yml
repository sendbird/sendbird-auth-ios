name: Run Chat ObjC Tests

on:
  workflow_call:
    inputs:
      iphone_device:
        description: "iPhone model for testing"
        required: false
        type: string
        default: "iPhone 16 Pro Max"
      xcode_version:
        description: "Xcode version for testing"
        required: false
        type: string
        default: "16.4"
      configuration:
        description: "Configuration for building and testing (e.g., Debug, Release, etc.)"
        required: false
        type: string
        default: "Debug"
      branch_name:
        description: "Auth branch name"
        required: true
        type: string
      sha_name:
        description: "SHA of auth branch"
        required: true
        type: string
      chat_branch:
        description: "Chat SDK branch to use"
        required: false
        type: string
        default: "develop"

jobs:
  run-objc-tests:
    runs-on: [self-hosted, macOS, ARM64, M1]
    timeout-minutes: 45
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    outputs:
      machine_name: ${{ steps.run_tests.outputs.machine_name }}
    strategy:
      matrix:
        test-group: [1, 2, 3, 4]
      fail-fast: false
    name: ObjC Test ${{ matrix.test-group}}

    steps:
      - name: Verify Architecture
        run: |
          arch
          echo "Running on $(uname -m) architecture"

      - name: Checkout Auth repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch_name }}

      - name: Get Auth commit SHA
        id: auth-sha
        run: |
          AUTH_SHA=$(git rev-parse HEAD)
          echo "sha=$AUTH_SHA" >> $GITHUB_OUTPUT
          echo "Auth commit SHA: $AUTH_SHA"

      - name: Set up SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global url."git@github.com:".insteadOf "https://github.com/"

      - name: Clone chat-ios
        env:
          CHAT_BRANCH: ${{ inputs.chat_branch }}
        run: |
          git clone git@github.com:sendbird/chat-ios.git chat-ios
          cd chat-ios
          git checkout "$CHAT_BRANCH"
          echo "Checked out chat-ios branch: $CHAT_BRANCH"

      - name: Update Auth dependency to current commit
        env:
          AUTH_SHA: ${{ steps.auth-sha.outputs.sha }}
        run: |
          cd chat-ios
          sed -i '' "s|version: .*|revision: $AUTH_SHA|g" project.yml
          echo "Updated project.yml:"
          grep -A2 "SendbirdAuthSDK:" project.yml

      - name: Select Xcode version
        run: |
          CURRENT_PATH=$(xcode-select -p)
          if [ "$CURRENT_PATH" != "/Applications/Xcode.app/Contents/Developer" ]; then
            echo "Switching Xcode path to /Applications/Xcode.app"
            sudo xcode-select -s /Applications/Xcode.app
          else
            echo "Xcode path already set to /Applications/Xcode.app"
          fi

      - name: Restore caches
        uses: ./.github/composite-actions/restore-caches
        with:
          cache-key: ${{ inputs.sha_name }}
          branch-name: ${{ inputs.branch_name }}

      - name: Install dependencies
        run: |
          cd chat-ios
          bundle install

      - name: Restore failed test list (re-run only)
        if: github.run_attempt > 1
        id: restore-failed
        uses: actions/cache/restore@v3
        with:
          path: /tmp/ci-failed-tests/${{ github.run_id }}
          key: failed-tests-${{ github.run_id }}-objc-${{ matrix.test-group }}-latest
          restore-keys: |
            failed-tests-${{ github.run_id }}-objc-${{ matrix.test-group }}-

      - name: Prepare re-run test list
        if: github.run_attempt > 1
        id: rerun-tests
        env:
          MATRIX_TEST_GROUP: ${{ matrix.test-group }}
        run: |
          FAILED_FILE="/tmp/ci-failed-tests/${{ github.run_id }}/failed-objc-${MATRIX_TEST_GROUP}.txt"
          if [ -f "$FAILED_FILE" ] && [ -s "$FAILED_FILE" ]; then
            FAILED_TESTS=$(tr '\n' ',' < "$FAILED_FILE" | sed 's/,$//')
            echo "found=true" >> $GITHUB_OUTPUT
            echo "test_list=$FAILED_TESTS" >> $GITHUB_OUTPUT
            echo "🔄 Re-run will execute only previously failed tests: $FAILED_TESTS"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "⚠️ No failed test list found, will run all tests"
          fi

      - name: Run test-${{ matrix.test-group }}
        id: run_tests
        env:
          FASTLANE_TEST_OUTPUT: true
          BRANCH_NAME: ${{ inputs.branch_name }}
          SHA_NAME: ${{ inputs.sha_name }}
          CONFIGURATION: ${{ inputs.configuration }}
          MATRIX_TEST_GROUP: ${{ matrix.test-group }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          RERUN_TESTS_FOUND: ${{ steps.rerun-tests.outputs.found }}
          RERUN_TEST_LIST: ${{ steps.rerun-tests.outputs.test_list }}
        run: |
          cd chat-ios

          echo "🗂️ Listing all files in ./tests:"
          ls -la ./tests

          # Determine test file name based on ordinal suffix
          ORDINAL=""
          if [ "$MATRIX_TEST_GROUP" == "1" ]; then
            ORDINAL="st"
          elif [ "$MATRIX_TEST_GROUP" == "2" ]; then
            ORDINAL="nd"
          elif [ "$MATRIX_TEST_GROUP" == "3" ]; then
            ORDINAL="rd"
          else
            ORDINAL="th"
          fi

          TEST_FILE="./tests/${MATRIX_TEST_GROUP}${ORDINAL}.tests"
          if [ ! -f "$TEST_FILE" ]; then
            TEST_FILE="./tests/${MATRIX_TEST_GROUP}.tests"
          fi

          echo "Running tests from $TEST_FILE"

          # Log existing ci-temp simulators for debugging
          echo "🔍 Verifying simctl and uuidgen availability..."

          if ! command -v xcrun >/dev/null; then
            echo "❌ xcrun command not found. Exiting."
            exit 1
          fi

          if ! xcrun simctl list devices >/dev/null; then
            echo "❌ Failed to list simulators using simctl. Exiting."
            exit 1
          fi

          echo "✅ simctl is available. Listing existing ci-temp simulators:"
          xcrun simctl list devices | grep "ci-temp" || echo "No existing ci-temp simulators"

          if ! command -v uuidgen >/dev/null; then
            echo "❌ uuidgen not found. Exiting."
            exit 1
          fi

          echo "🤔 Guessing the machine name"
          IP_ADDRESS=$(ifconfig | grep -A 1 "inet " | grep "netmask 0xffffff00" | awk '{print $2}' | head -1)
          IP_ADDRESS_FORMATTED=$(echo "$IP_ADDRESS" | tr '.' '-')
          MACHINE_NAME="ip-$IP_ADDRESS_FORMATTED"
          echo "Machine Name: $MACHINE_NAME"
          echo "machine_name=$MACHINE_NAME" >> $GITHUB_OUTPUT

          SUFFIX="${GITHUB_RUN_ID}-$(uuidgen | cut -c1-8)"
          START_CREATE=$(date +%s)
          DEVICE_NAME="ci-temp-${SUFFIX}"
          DEVICE_TYPE="iPhone 16 Pro Max"
          RUNTIME_ID=$(xcrun simctl list runtimes | grep "iOS" | grep -Eo 'com.apple.CoreSimulator.SimRuntime.iOS-[^)]+' | head -n1)
          DEVICE_ID=$(xcrun simctl create "$DEVICE_NAME" "$DEVICE_TYPE" "$RUNTIME_ID")

          # Save to GITHUB_ENV for cleanup step (works even if this step fails)
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV
          echo "DEVICE_NAME=$DEVICE_NAME" >> $GITHUB_ENV

          echo "Created simulator $DEVICE_NAME with ID $DEVICE_ID and runtime $RUNTIME_ID"
          xcrun simctl boot "$DEVICE_ID"

          echo "Waiting for simulator $DEVICE_ID to finish booting..."
          xcrun simctl bootstatus "$DEVICE_ID" -b

          # Wait for simulator to be actually usable by Xcode
          MAX_ATTEMPTS=60
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
               if xcrun xcodebuild -destination "id=$DEVICE_ID" -list >/dev/null 2>&1; then
                  echo "✅ Simulator $DEVICE_ID is ready for Xcode operations"
                  break
              fi
              echo "Waiting for simulator to be Xcode-ready... (attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS)"
              sleep 2
              ATTEMPT=$((ATTEMPT + 1))
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "❌ Simulator failed to become ready within expected time"
              xcrun simctl list devices
              exit 1
          fi

          END_CREATE=$(date +%s)

          START_TEST=$(date +%s)
          echo "TEST_START_TIMESTAMP=$START_TEST" >> $GITHUB_ENV

          export SIMULATOR_ID=$DEVICE_ID

          # Run test
          set +e
          set -o pipefail

          # On re-run, override with previously failed tests only
          if [ "${{ github.run_attempt }}" -gt 1 ] && [ "$RERUN_TESTS_FOUND" == "true" ]; then
            echo "🔄 Re-run mode: running only previously failed tests"
            TEST_CASES="$RERUN_TEST_LIST"
          else
            TEST_CASES="$(cat $TEST_FILE)"
          fi

          bundle exec fastlane ios test_with_retry \
            test_cases:"$TEST_CASES" \
            config:"$CONFIGURATION" \
            scheme:"SendbirdChatSDK" 2>&1 | tee test_output.log

          CODE=${PIPESTATUS[0]}

          set -e

          echo "fastlane_exit_code=$CODE" >> $GITHUB_OUTPUT
          echo "🚫 EXIT CODE = ${CODE}"

          END_TEST=$(date +%s)

          # Check for Exit status: 70 error
          if [ "$CODE" -ne 0 ]; then
            if grep -E -q "Exit status: 70" test_output.log; then
              echo "🚨 ALERT: Exit status: 70 detected - Runner abnormal behavior detected!"
              echo "exit_70_detected=true" >> $GITHUB_OUTPUT
            else
              echo "✅ Runner is working properly."
              echo "exit_70_detected=false" >> $GITHUB_OUTPUT
            fi
            exit "$CODE"
          else
            echo "exit_70_detected=false" >> $GITHUB_OUTPUT
          fi

          CREATE_TIME=$((END_CREATE - START_CREATE))
          TEST_TIME=$((END_TEST - START_TEST))

          echo "⏱️ Simulator creation time: ${CREATE_TIME}s"
          echo "🧪 Test execution time: ${TEST_TIME}s"

      - name: Save failed test list for re-run
        if: always() && steps.run_tests.outcome == 'failure' && steps.run_tests.outputs.exit_70_detected != 'true'
        env:
          MATRIX_TEST_GROUP: ${{ matrix.test-group }}
          OBJC_TEST_TARGET: SendbirdChatObjcTests
        run: |
          FAILED_DIR="/tmp/ci-failed-tests/${{ github.run_id }}"
          mkdir -p "$FAILED_DIR"

          # Find xcresult created AFTER test started (filter out stale results from previous runs)
          XCRESULT=$(find chat-ios/fastlane/test_output chat-ios/test_output /tmp/scan/output \
            -name "*.xcresult" -type d 2>/dev/null \
            -exec stat -f "%m %N" {} \; 2>/dev/null | \
            awk -v ts="$TEST_START_TIMESTAMP" '$1 >= ts' | sort -rn | head -1 | cut -d' ' -f2-)
          if [ -z "$XCRESULT" ]; then
            echo "No xcresult found after test start (ts=$TEST_START_TIMESTAMP), skipping"
            exit 0
          fi

          echo "Extracting failed tests from: $XCRESULT"

          # Extract failed ObjC test names from xcresult
          xcrun xcresulttool get --legacy --format json --path "$XCRESULT" 2>/dev/null | \
            python3 -c "
import os, sys, json, re
data = json.load(sys.stdin)
failed = set()
objc_target = os.environ.get('OBJC_TEST_TARGET', 'SendbirdChatObjcTests')
for a in data.get('actions',{}).get('_values',[]):
    vals = a.get('actionResult',{}).get('issues',{}).get('testFailureSummaries',{}).get('_values',[])
    for s in vals:
        name = s.get('testCaseName',{}).get('_value','')
        if not name or not name.startswith('-['): continue
        m = re.match(r'-\[(\w+)\s+(\w+)\]', name)
        if m: failed.add(f'{objc_target}/{m.group(1)}/{m.group(2)}')
for t in sorted(failed): print(t)
" > "$FAILED_DIR/failed-objc-${MATRIX_TEST_GROUP}.txt" 2>/dev/null || true

          if [ -s "$FAILED_DIR/failed-objc-${MATRIX_TEST_GROUP}.txt" ]; then
            echo "Saved $(wc -l < "$FAILED_DIR/failed-objc-${MATRIX_TEST_GROUP}.txt") failed tests:"
            cat "$FAILED_DIR/failed-objc-${MATRIX_TEST_GROUP}.txt"
          else
            echo "No failed tests extracted"
          fi

      - name: Cache failed test list
        if: always() && steps.run_tests.outcome == 'failure' && steps.run_tests.outputs.exit_70_detected != 'true'
        uses: actions/cache/save@v3
        with:
          path: /tmp/ci-failed-tests/${{ github.run_id }}
          key: failed-tests-${{ github.run_id }}-objc-${{ matrix.test-group }}-attempt${{ github.run_attempt }}

      # Cleanup simulator - runs even if tests fail/timeout/cancel
      - name: Cleanup simulator
        if: always()
        run: |
          if [ -n "${{ env.DEVICE_ID }}" ]; then
            echo "🔻 Cleaning up simulator ${{ env.DEVICE_ID }} (${{ env.DEVICE_NAME }})"
            xcrun simctl list devices | grep "${{ env.DEVICE_ID }}" || echo "Simulator ${{ env.DEVICE_ID }} not found in device list"
            xcrun simctl shutdown "${{ env.DEVICE_ID }}" 2>/dev/null || echo "⚠️ Failed to shutdown simulator ${{ env.DEVICE_ID }}"
            xcrun simctl delete "${{ env.DEVICE_ID }}" 2>/dev/null || echo "⚠️ Failed to delete simulator ${{ env.DEVICE_ID }}"
            echo "✅ Simulator cleanup completed"
          else
            echo "⚠️ No DEVICE_ID found, skipping cleanup"
          fi

      - name: Update ObjC test group status
        if: always()
        env:
          EXIT_70_DETECTED: ${{ steps.run_tests.outputs.exit_70_detected }}
          MACHINE_NAME: ${{ steps.run_tests.outputs.machine_name }}
          SHA_NAME: ${{ inputs.sha_name }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          MATRIX_TEST_GROUP: ${{ matrix.test-group }}
          STEP_RUN_TESTS_OUTCOME: ${{ steps.run_tests.outcome }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine status based on test outcome and Exit status: 70 detection
          if [ "$EXIT_70_DETECTED" == "true" ]; then
            STATE="failure"
            DESCRIPTION="ObjC test $MATRIX_TEST_GROUP failed - Runner issue on $MACHINE_NAME"
            echo "🚨 Exit status: 70 detected in ObjC test group $MATRIX_TEST_GROUP on machine $MACHINE_NAME - Runner abnormal behavior!"
          elif [ "$STEP_RUN_TESTS_OUTCOME" == "success" ]; then
            STATE="success"
            DESCRIPTION="ObjC test $MATRIX_TEST_GROUP passed"
          else
            STATE="failure"
            DESCRIPTION="ObjC test $MATRIX_TEST_GROUP failed"
          fi

          # Update status via curl
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/statuses/$SHA_NAME" \
            -d "{\"state\":\"$STATE\",\"context\":\"objc-test-$MATRIX_TEST_GROUP\",\"description\":\"$DESCRIPTION\",\"target_url\":\"https://github.com/$REPO/actions/runs/$RUN_ID\"}"

          echo "Updated objc-test-$MATRIX_TEST_GROUP status to $STATE"

      - name: Upload test results as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: objc-test-results-artifact-${{ matrix.test-group }}
          path: |
            ~/Library/Logs/scan
            chat-ios/test_output
            chat-ios/fastlane/test_output

      - name: Check test results
        env:
          RUN_TESTS_OUTCOME: ${{ steps.run_tests.outcome }}
        if: env.RUN_TESTS_OUTCOME != 'success'
        run: exit 1

  notify-objc-result:
    runs-on: ubuntu-latest
    if: always()
    needs: [run-objc-tests]
    steps:
      - name: Determine overall result
        id: result_check
        env:
          NEEDS_RESULT: ${{ needs.run-objc-tests.result }}
        run: |
          echo "🔍 needs.run-objc-tests.result = '$NEEDS_RESULT'"
          if echo "$NEEDS_RESULT" | grep -q "success"; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Update overall ObjC test status
        env:
          STATUS: ${{ steps.result_check.outputs.status }}
          SHA_NAME: ${{ inputs.sha_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONTEXT="objc-test-overall"
          DESCRIPTION="All ObjC tests $STATUS"
          STATE="$STATUS"

          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$SHA_NAME" \
            -d "{\"state\":\"$STATE\",\"context\":\"$CONTEXT\",\"description\":\"$DESCRIPTION\",\"target_url\":\"https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"

          echo "Updated status context '$CONTEXT' with state '$STATE'"

      - name: Fail if any test failed
        env:
          RESULT_STATUS: ${{ steps.result_check.outputs.status }}
        if: env.RESULT_STATUS != 'success'
        run: exit 1
